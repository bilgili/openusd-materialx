# Wheel build pipeline.
#
# Versions are variable, set them as CI/CD variables or per manual ("Run pipeline") run:
#   OPENUSD_REF            OpenUSD tag/branch/sha          (default v26.05)
#   MATERIALX_REF          MaterialX tag/branch/sha        (default main = latest source)
#   OPENUSD_BUILD_PROFILE  full | default | minimal        (default full)
#   BUILD_PKG              both | openusd-materialx | materialx-python  (default both)
#
# The wheel version comes from the git tag: pushing tag v1.2.3 builds wheels 1.2.3.
# Untagged manual runs build 0.0.0. Wheels are exposed as job artifacts only.
#
# Pipelines run on tags and on manual ("web") runs, not on every push (full OpenUSD
# builds are heavy).

stages:
  - build

variables:
  OPENUSD_REF: "v26.05"
  MATERIALX_REF: "main"
  OPENUSD_BUILD_PROFILE: "full"
  BUILD_PKG: "both"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

.rules: &rules
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "web"

.build_unix:
  stage: build
  <<: *rules
  script:
    - export PACKAGE_VERSION="${CI_COMMIT_TAG#v}"; export PACKAGE_VERSION="${PACKAGE_VERSION:-0.0.0}"
    - echo "PACKAGE_VERSION=$PACKAGE_VERSION BUILD_PKG=$BUILD_PKG OPENUSD_REF=$OPENUSD_REF MATERIALX_REF=$MATERIALX_REF PROFILE=$OPENUSD_BUILD_PROFILE"
    - python -m pip install -U pip build setuptools wheel pytest PyOpenGL PySide6 jinja2 "cmake<4"
    - |
      if [ "$BUILD_PKG" = "both" ] || [ "$BUILD_PKG" = "materialx-python" ]; then
        python scripts/build_materialx_python_bundle.py --ref "$MATERIALX_REF" --clean
        python packages/materialx-python/scripts/validate_materialx_bundle.py
        # No repair tool: the bundle is self-contained (rpaths + shim bootstrap).
        python -m build --wheel --outdir wheelhouse packages/materialx-python
      fi
    - |
      if [ "$BUILD_PKG" = "both" ] || [ "$BUILD_PKG" = "openusd-materialx" ]; then
        python scripts/build_openusd_bundle.py --ref "$OPENUSD_REF" --materialx-ref "$MATERIALX_REF" --profile "$OPENUSD_BUILD_PROFILE" --clean
        python scripts/validate_bundle.py
        # No delocate/auditwheel: build_openusd_bundle.py already self-contains the bundle.
        python -m build --wheel --outdir wheelhouse
      fi
  artifacts:
    when: always
    paths:
      - wheelhouse/*.whl
    expire_in: 1 week

# Python matrix runs each job once per interpreter. The official python:<ver> images
# provide the right `python`; macOS/Windows runners must have python3.12/3.13/3.14 installed.
linux:
  extends: .build_unix
  image: python:$PYTHON_VERSION-bookworm
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.12", "3.13", "3.14"]
  before_script:
    - apt-get update
    # mesa/GL + X11 dev libs: MaterialX builds MaterialXRenderGlsl, which find_package(OpenGL).
    - DEBIAN_FRONTEND=noninteractive apt-get install -y build-essential git ninja-build patchelf
        libgl1-mesa-dev libglu1-mesa-dev mesa-common-dev libx11-dev libxt-dev libxmu-dev libxi-dev
    - python -m pip install --upgrade pip
  tags: [linux]

# Requires a configured macOS runner with python3.12/3.13/3.14 available.
macos:
  extends: .build_unix
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.12", "3.13", "3.14"]
  before_script:
    - "python$PYTHON_VERSION -m venv .venv"
    - . .venv/bin/activate
    - python -m pip install -U pip
    - brew install ninja || true   # cmake comes from pip (cmake<4) in the build script
    # universal2-vs-single-arch wheel tag is fixed in setup.py get_tag() (retag -> runner arch).
  tags: [macos]

# Requires a configured Windows runner with VS Build Tools and py launcher 3.11/3.13/3.14.
windows:
  stage: build
  <<: *rules
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.12", "3.13", "3.14"]
  before_script:
    - "py -$env:PYTHON_VERSION -m venv .venv"
    - .venv\Scripts\Activate.ps1
    - python -m pip install -U pip build setuptools wheel pytest PyOpenGL PySide6 jinja2 "cmake<4"
  script:
    - |
      if ($env:CI_COMMIT_TAG) { $env:PACKAGE_VERSION = ($env:CI_COMMIT_TAG -replace '^v','') } else { $env:PACKAGE_VERSION = '0.0.0' }
      Write-Host "PACKAGE_VERSION=$env:PACKAGE_VERSION BUILD_PKG=$env:BUILD_PKG"
    - |
      if ($env:BUILD_PKG -eq 'both' -or $env:BUILD_PKG -eq 'materialx-python') {
        python scripts/build_materialx_python_bundle.py --ref "$env:MATERIALX_REF" --clean
        python packages/materialx-python/scripts/validate_materialx_bundle.py
        # No delvewheel: bundle is self-contained (DLLs found via os.add_dll_directory in shim).
        python -m build --wheel --outdir wheelhouse packages/materialx-python
      }
    - |
      if ($env:BUILD_PKG -eq 'both' -or $env:BUILD_PKG -eq 'openusd-materialx') {
        python scripts/build_openusd_bundle.py --ref "$env:OPENUSD_REF" --materialx-ref "$env:MATERIALX_REF" --profile "$env:OPENUSD_BUILD_PROFILE" --clean
        python scripts/validate_bundle.py
        # No delvewheel: build_openusd_bundle.py already self-contains the bundle.
        python -m build --wheel --outdir wheelhouse
      }
  artifacts:
    when: always
    paths:
      - wheelhouse/*.whl
    expire_in: 1 week
  tags: [windows]
